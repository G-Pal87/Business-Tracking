name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC every day
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Create daily backup
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const MAX_BACKUPS = 30;
            const { owner, repo } = context.repo;

            // 1. Read current db.json
            let dbFile;
            try {
              const { data } = await github.rest.repos.getContent({
                owner, repo, path: 'data/db.json'
              });
              dbFile = data;
            } catch (e) {
              core.setFailed(`Failed to read data/db.json: ${e.message}`);
              return;
            }

            let db;
            try {
              const text = Buffer.from(dbFile.content, 'base64').toString('utf8');
              db = JSON.parse(text);
            } catch (e) {
              core.setFailed(`data/db.json is not valid JSON: ${e.message}`);
              return;
            }

            // Strip token — must never appear in backup files
            if (db.appConfig?.github?.token) delete db.appConfig.github.token;

            // 2. Build snapshot (same format as manual Export JSON)
            const today = new Date().toISOString().slice(0, 10);
            const filename = `bt-backup-${today}.json`;
            const backupPath = `backups/${filename}`;

            const snapshot = {
              exportVersion: 2,
              schemaVersion: 1,
              exportedAt: new Date().toISOString(),
              source: 'github-actions-daily-backup',
              snapshotName: filename,
              data: db
            };
            const b64 = Buffer.from(JSON.stringify(snapshot, null, 2)).toString('base64');

            // 3. Write backup (create or overwrite today's file)
            let existingSha;
            try {
              const { data: ex } = await github.rest.repos.getContent({
                owner, repo, path: backupPath
              });
              existingSha = ex.sha;
            } catch { /* file doesn't exist yet — that's fine */ }

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo,
              path: backupPath,
              message: `Automated backup: ${filename}`,
              content: b64,
              ...(existingSha ? { sha: existingSha } : {})
            });

            core.info(`Backup saved: ${backupPath}`);

            // 4. Trim oldest backups beyond MAX_BACKUPS
            let items;
            try {
              const { data } = await github.rest.repos.getContent({
                owner, repo, path: 'backups'
              });
              items = Array.isArray(data) ? data : [];
            } catch (e) {
              core.warning(`Could not list backups/ for trimming: ${e.message}`);
              return;
            }

            const jsons = items
              .filter(f => f.type === 'file' && f.name.endsWith('.json'))
              .sort((a, b) => a.name.localeCompare(b.name)); // oldest first

            const excess = jsons.length - MAX_BACKUPS;
            for (let i = 0; i < excess; i++) {
              try {
                await github.rest.repos.deleteFile({
                  owner, repo,
                  path: jsons[i].path,
                  message: `Auto-trim old backup: ${jsons[i].name}`,
                  sha: jsons[i].sha
                });
                core.info(`Deleted old backup: ${jsons[i].path}`);
              } catch (e) {
                core.warning(`Failed to delete ${jsons[i].path}: ${e.message}`);
              }
            }

            core.info(`Done. Active backups: ${Math.min(jsons.length, MAX_BACKUPS)}`);
