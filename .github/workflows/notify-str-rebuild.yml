name: Notify Short-Term-Rentals on rate update

on:
  push:
    branches: [main]
    paths:
      - 'exports/daily-rates/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Short-Term-Rentals site rebuild
        run: |
          curl -s -f -X POST https://api.github.com/repos/G-Pal87/Short-Term-Rentals/dispatches \
            -H "Authorization: token ${{ secrets.STR_DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"event_type":"rates-updated"}'
