name: Export daily-rate feeds

# Manual-only fallback regenerator for exports/daily-rates/.
#
# The in-app publisher (js/modules/str-rates.js → autoPublishRatesFeeds) is the
# single source of truth for the feeds: it runs the full weighted-blend pricing
# engine and publishes on every relevant change. This standalone script uses a
# simpler suggester, so running it automatically (on push / schedule) overwrote
# the app's feeds with different numbers — making published rates flip-flop.
#
# Triggers are therefore limited to manual dispatch. Use it only to bootstrap or
# repair feeds when the app hasn't published; expect simpler pricing than the app.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: export-daily-rates
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate daily-rate feeds
        run: node scripts/export-daily-rates.js

      - name: Commit feeds if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/daily-rates
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Update daily-rate feeds [skip ci]"
            git push
          fi

      - name: Trigger Short-Term-Rentals site rebuild
        run: |
          curl -s -X POST https://api.github.com/repos/G-Pal87/Short-Term-Rentals/dispatches \
            -H "Authorization: token ${{ secrets.STR_DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"event_type":"rates-updated"}'
